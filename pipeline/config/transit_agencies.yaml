# Transit agency per region.
#
# IMPORTANT: city websites change these URLs often. If any link goes 404,
# replace the URL here and re-run the pipeline.
#
# A Google Maps search URL is used as the canonical link — it always works,
# always shows current website + hours + route map. Cleaner than betting on
# city-website paths.

Hamilton:
  primary_name: "HSR"
  primary_url: "https://www.google.com/maps/search/?api=1&query=HSR+Hamilton+Street+Railway"
  agencies:
    - { name: "HSR (Hamilton Street Railway)", url: "https://www.google.com/maps/search/?api=1&query=HSR+Hamilton+Street+Railway" }

